  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Content Calendar</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">PLAN YOUR POSTING SCHEDULE FOR MAXIMUM REACH</text>
  <circle cx="100" cy="100" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1100" cy="530" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="150" cy="500" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1050" cy="130" r="2" fill="#22d3ee" opacity="0.2"/>
</svg>