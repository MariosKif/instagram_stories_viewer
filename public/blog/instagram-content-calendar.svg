    <text x="0" y="-88" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#22d3ee" opacity="0.8">March 2026</text>
    <!-- Day headers -->
    <text x="-140" y="-50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8" opacity="0.5">MON</text>
    <text x="-90" y="-50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8" opacity="0.5">TUE</text>
    <text x="-40" y="-50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8" opacity="0.5">WED</text>
    <text x="10" y="-50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8" opacity="0.5">THU</text>
    <text x="60" y="-50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8" opacity="0.5">FRI</text>
    <text x="110" y="-50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8" opacity="0.5">SAT</text>
    <text x="150" y="-50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8" opacity="0.5">SUN</text>
