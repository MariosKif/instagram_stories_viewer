    <text x="-90" y="-22" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">2</text>
    <circle cx="-90" cy="-16" r="3" fill="#0ea5e9" opacity="0.6"/>
    <text x="-40" y="-22" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">3</text>
    <text x="10" y="-22" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">4</text>
    <circle cx="10" cy="-16" r="3" fill="#22d3ee" opacity="0.6"/>
    <text x="60" y="-22" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">5</text>
    <circle cx="60" cy="-16" r="3" fill="#0ea5e9" opacity="0.6"/>
    <!-- Highlighted day -->
    <circle cx="-40" cy="20" r="16" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="-40" y="25" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#0ea5e9">10</text>
    <text x="-140" y="25" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">8</text>
    <circle cx="-140" cy="31" r="3" fill="#22d3ee" opacity="0.6"/>
    <text x="-90" y="25" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">9</text>
    <text x="10" y="25" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">11</text>
    <circle cx="10" cy="31" r="3" fill="#0ea5e9" opacity="0.6"/>
    <text x="60" y="25" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">12</text>
    <circle cx="60" cy="31" r="3" fill="#22d3ee" opacity="0.6"/>
    <!-- Row 3 -->
    <text x="-140" y="70" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">15</text>
    <circle cx="-140" cy="76" r="3" fill="#0ea5e9" opacity="0.6"/>
    <text x="-90" y="70" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">16</text>
    <text x="-40" y="70" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">17</text>
    <circle cx="-40" cy="76" r="3" fill="#22d3ee" opacity="0.6"/>
    <text x="10" y="70" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">18</text>
    <circle cx="10" cy="76" r="3" fill="#0ea5e9" opacity="0.6"/>
    <text x="60" y="70" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8" opacity="0.6">19</text>
    <!-- Clock icon -->
    <g transform="translate(140, -5)" opacity="0.5">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="-10" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="7" y2="4" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
    </g>
