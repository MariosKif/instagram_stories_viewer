<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="200" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="400" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Analytics Dashboard Panel -->
  <g transform="translate(600, 240)">
    <!-- Main dashboard frame -->
    <rect x="-260" y="-140" width="520" height="280" rx="16" fill="#1e293b" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <!-- Top bar -->
    <rect x="-260" y="-140" width="520" height="40" rx="16" fill="#0ea5e9" opacity="0.1"/>
    <rect x="-260" y="-100" width="520" height="1" fill="#0ea5e9" opacity="0.2"/>
    <!-- Window dots -->
    <circle cx="-235" cy="-120" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="-218" cy="-120" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="-201" cy="-120" r="5" fill="#22c55e" opacity="0.7"/>
    <!-- Dashboard title bar text -->
    <rect x="-100" y="-128" width="200" height="14" rx="3" fill="#94a3b8" opacity="0.3"/>
    <!-- Bar chart -->
    <rect x="-220" y="20" width="30" height="90" rx="4" fill="url(#barGrad)"/>
    <rect x="-180" y="-10" width="30" height="120" rx="4" fill="url(#barGrad)"/>
    <rect x="-140" y="40" width="30" height="70" rx="4" fill="url(#barGrad)"/>
    <rect x="-100" y="-30" width="30" height="140" rx="4" fill="url(#barGrad)"/>
    <rect x="-60" y="10" width="30" height="100" rx="4" fill="url(#barGrad)"/>
    <rect x="-20" y="-20" width="30" height="130" rx="4" fill="url(#barGrad)"/>
    <!-- X axis -->
    <line x1="-230" y1="115" x2="20" y2="115" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
    <!-- Line chart (right side) -->
    <polyline points="60,-50 100,-20 140,-60 180,-10 220,-40 240,-70" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="60,-30 100,0 140,-20 180,10 220,-5 240,-25" stroke="#0ea5e9" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Data points on line chart -->
    <circle cx="60" cy="-50" r="4" fill="#22d3ee"/>
    <circle cx="100" cy="-20" r="4" fill="#22d3ee"/>
    <circle cx="140" cy="-60" r="4" fill="#22d3ee"/>
    <circle cx="180" cy="-10" r="4" fill="#22d3ee"/>
    <circle cx="220" cy="-40" r="4" fill="#22d3ee"/>
    <circle cx="240" cy="-70" r="4" fill="#22d3ee"/>
    <!-- Pie chart mini -->
    <circle cx="160" cy="70" r="35" fill="none" stroke="#0ea5e9" stroke-width="8" stroke-dasharray="80 140" opacity="0.7"/>
    <circle cx="160" cy="70" r="35" fill="none" stroke="#22d3ee" stroke-width="8" stroke-dasharray="50 170" stroke-dashoffset="-80" opacity="0.8"/>
    <circle cx="160" cy="70" r="35" fill="none" stroke="#0ea5e9" stroke-width="8" stroke-dasharray="30 190" stroke-dashoffset="-130" opacity="0.4"/>
    <!-- Stat cards row -->
    <rect x="-220" y="-90" width="100" height="50" rx="8" fill="#0ea5e9" opacity="0.08"/>
    <rect x="-105" y="-90" width="100" height="50" rx="8" fill="#22d3ee" opacity="0.08"/>
    <rect x="10" y="-90" width="100" height="50" rx="8" fill="#0ea5e9" opacity="0.08"/>
    <rect x="125" y="-90" width="100" height="50" rx="8" fill="#22d3ee" opacity="0.08"/>
    <!-- Stat numbers -->
    <text x="-170" y="-68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0ea5e9" opacity="0.8">12.4K</text>
    <text x="-170" y="-52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" opacity="0.6">FOLLOWERS</text>
    <text x="-55" y="-68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#22d3ee" opacity="0.8">3.2%</text>
    <text x="-55" y="-52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" opacity="0.6">ENG RATE</text>
    <text x="60" y="-68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0ea5e9" opacity="0.8">847</text>
    <text x="60" y="-52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" opacity="0.6">POSTS</text>
    <text x="175" y="-68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#22d3ee" opacity="0.8">98K</text>
    <text x="175" y="-52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" opacity="0.6">REACH</text>
  </g>
  <!-- Magnifying glass icon -->
  <g transform="translate(600, 240)" opacity="0.5">
    <circle cx="290" cy="-120" r="20" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <line x1="304" y1="-106" x2="318" y2="-92" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Analytics Tools</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">6 BEST FREE OPTIONS FOR COMPETITIVE RESEARCH</text>
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1100" cy="530" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="150" cy="500" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1050" cy="130" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="950" cy="80" r="4" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="250" cy="550" r="4" fill="#22d3ee" opacity="0.15"/>
</svg>
