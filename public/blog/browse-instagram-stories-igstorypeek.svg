<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="250" cy="350" r="200" fill="#22d3ee" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="950" cy="250" r="180" fill="#0ea5e9" opacity="0.08" filter="url(#blur1)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- Browser window -->
  <g transform="translate(600,220)">
    <!-- Browser frame -->
    <rect x="-140" y="-80" width="280" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="-140" y="-80" width="280" height="32" rx="12" fill="#1e293b"/>
    <rect x="-140" y="-60" width="280" height="12" fill="#1e293b"/>
    <!-- Traffic lights -->
    <circle cx="-118" cy="-64" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="-102" cy="-64" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="-86" cy="-64" r="5" fill="#22c55e" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="-60" y="-72" width="160" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="-50" y="-60" font-family="monospace" font-size="8" fill="#0ea5e9">igstorypeek.com</text>
    <!-- Search bar inside browser -->
    <rect x="-100" y="-30" width="200" height="28" rx="14" fill="#0f172a" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
    <!-- Search icon -->
    <g transform="translate(-80,-16)">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <line x1="4" y1="4" x2="8" y2="8" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="-60" y="-12" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Search username...</text>
    <!-- Story circles preview -->
    <g transform="translate(0,30)">
      <circle cx="-60" cy="0" r="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <circle cx="-60" cy="0" r="15" fill="#334155"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="15" fill="#334155"/>
      <circle cx="60" cy="0" r="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <circle cx="60" cy="0" r="15" fill="#334155"/>
    </g>
    <!-- Play icons in circles -->
    <g transform="translate(0,30)" fill="#0ea5e9" opacity="0.7">
      <polygon points="-64,0 -54,-6 -54,6" transform="translate(0,0)"/>
      <polygon points="-4,0 6,-6 6,6" transform="translate(0,0)"/>
      <polygon points="56,0 66,-6 66,6" transform="translate(0,0)"/>
    </g>
  </g>
  <!-- Floating elements -->
  <g opacity="0.3">
    <!-- Cursor -->
    <g transform="translate(780,340)">
      <path d="M0 0 L0 20 L6 15 L12 22 L15 20 L9 13 L16 10 Z" fill="#0ea5e9" stroke="#0ea5e9" stroke-width="0.5"/>
    </g>
    <!-- Click ripple -->
    <circle cx="780" cy="340" r="15" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
    <circle cx="780" cy="340" r="25" fill="none" stroke="#0ea5e9" stroke-width="0.5" opacity="0.2"/>
  </g>
  <!-- Text -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="0.5">Browse Instagram Stories with IGStoryPeek</text>
  <text x="600" y="440" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94a3b8">No login required - search any public profile instantly</text>
  <!-- Bottom accent line -->
  <rect x="500" y="470" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Corner decorations -->
  <path d="M40 40 L40 80 M40 40 L80 40" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 40 L1160 80 M1160 40 L1120 40" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M40 590 L40 550 M40 590 L80 590" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 590 L1160 550 M1160 590 L1120 590" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>