<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="200" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="400" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Algorithm neural network / flow diagram -->
  <g transform="translate(600, 240)">
    <!-- Central brain/algorithm node -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="20" fill="#0ea5e9" opacity="0.15"/>
    <!-- Brain pattern inside -->
    <path d="M-12,-8 Q-6,-18 0,-8 Q6,-18 12,-8" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
    <path d="M-12,8 Q-6,18 0,8 Q6,18 12,8" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
    <!-- Input nodes (left) -->
    <circle cx="-160" cy="-80" r="22" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
    <text x="-160" y="-75" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0ea5e9" opacity="0.7">Feed</text>
    <circle cx="-160" cy="0" r="22" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <text x="-160" y="5" text-anchor="middle" font-family="system-ui" font-size="10" fill="#22d3ee" opacity="0.7">Reels</text>
    <circle cx="-160" cy="80" r="22" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
    <text x="-160" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0ea5e9" opacity="0.7">Stories</text>
    <!-- Output nodes (right) -->
    <circle cx="160" cy="-80" r="22" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <text x="160" y="-75" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22d3ee" opacity="0.7">Ranking</text>
    <circle cx="160" cy="0" r="22" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
    <text x="160" y="5" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0ea5e9" opacity="0.7">Signals</text>
    <circle cx="160" cy="80" r="22" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <text x="160" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22d3ee" opacity="0.7">Explore</text>
    <!-- Connection lines -->
    <line x1="-138" y1="-70" x2="-45" y2="-15" stroke="#0ea5e9" stroke-width="1.2" opacity="0.3"/>
    <line x1="-138" y1="0" x2="-45" y2="0" stroke="#22d3ee" stroke-width="1.2" opacity="0.3"/>
    <line x1="-138" y1="70" x2="-45" y2="15" stroke="#0ea5e9" stroke-width="1.2" opacity="0.3"/>
    <line x1="45" y1="-15" x2="138" y2="-70" stroke="#22d3ee" stroke-width="1.2" opacity="0.3"/>
    <line x1="45" y1="0" x2="138" y2="0" stroke="#0ea5e9" stroke-width="1.2" opacity="0.3"/>
    <line x1="45" y1="15" x2="138" y2="70" stroke="#22d3ee" stroke-width="1.2" opacity="0.3"/>
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.08"/>
  </g>
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Algorithm</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">HOW FEED, REELS, STORIES &amp; EXPLORE RANKING WORKS</text>
  <circle cx="100" cy="100" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1100" cy="530" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="150" cy="500" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1050" cy="130" r="2" fill="#22d3ee" opacity="0.2"/>
</svg>