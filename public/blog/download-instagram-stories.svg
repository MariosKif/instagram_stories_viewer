<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="400" cy="250" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="800" cy="380" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Phone mockup -->
  <g transform="translate(600, 240)">
    <rect x="-65" y="-120" width="130" height="240" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="-55" y="-100" width="110" height="200" rx="4" fill="#0f172a"/>
    <!-- Story preview bars -->
    <rect x="-45" y="-85" width="90" height="8" rx="4" fill="#0ea5e9" opacity="0.3"/>
    <rect x="-45" y="-70" width="70" height="6" rx="3" fill="#334155"/>
    <rect x="-45" y="-55" width="90" height="60" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="-45" y="15" width="90" height="60" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Checkmarks on stories -->
    <circle cx="30" cy="-25" r="10" fill="#0ea5e9" opacity="0.2"/>
    <path d="M25 -25 L29 -21 L36 -30" stroke="#0ea5e9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="30" cy="45" r="10" fill="#0ea5e9" opacity="0.2"/>
    <path d="M25 45 L29 49 L36 40" stroke="#0ea5e9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Notch -->
    <rect x="-20" y="-117" width="40" height="6" rx="3" fill="#334155"/>
  </g>
  <!-- Download arrow -->
  <g transform="translate(600, 240)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.15" stroke-dasharray="8 8"/>
    <!-- Large download arrow outside phone -->
    <g transform="translate(110, 30)">
      <rect x="-3" y="-35" width="6" height="40" rx="3" fill="url(#arrow)"/>
      <path d="M-15 5 L0 22 L15 5" stroke="url(#arrow)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="-18" y="28" width="36" height="4" rx="2" fill="url(#arrow)" opacity="0.6"/>
    </g>
    <!-- Small folder icon -->
    <g transform="translate(-120, 40)" opacity="0.5">
      <path d="M-18 -8 L-8 -8 L-4 -14 L18 -14 L18 14 L-18 14Z" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- HD badge -->
  <g transform="translate(740, 160)">
    <rect x="-22" y="-12" width="44" height="24" rx="5" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0ea5e9">HD</text>
  </g>
  <!-- Text -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Download Instagram Stories</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">SAVE STORIES, HIGHLIGHTS &amp; REELS IN HD</text>
  <!-- Decorative -->
  <circle cx="120" cy="90" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1080" cy="540" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="180" cy="520" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1020" cy="110" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="920" cy="70" r="4" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="280" cy="560" r="4" fill="#22d3ee" opacity="0.15"/>
</svg>
