<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>
  <!-- Phone outline -->
  <rect x="480" y="100" width="240" height="430" rx="24" fill="none" stroke="#0ea5e9" stroke-width="2.5" opacity="0.8"/>
  <rect x="540" y="108" width="120" height="6" rx="3" fill="#0ea5e9" opacity="0.4"/>
  <!-- Play button -->
  <circle cx="600" cy="290" r="40" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.7"/>
  <polygon points="588,268 588,312 622,290" fill="#0ea5e9" opacity="0.8"/>
  <!-- Download arrow -->
  <line x1="600" y1="370" x2="600" y2="430" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <polyline points="580,415 600,435 620,415" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <line x1="570" y1="445" x2="630" y2="445" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Reels icon left -->
  <rect x="280" y="220" width="100" height="140" rx="12" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.3"/>
  <circle cx="330" cy="275" r="15" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.3"/>
  <polygon points="325,268 325,282 337,275" fill="#0ea5e9" opacity="0.3"/>
  <!-- Reels icon right -->
  <rect x="820" y="220" width="100" height="140" rx="12" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.3"/>
  <circle cx="870" cy="275" r="15" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.3"/>
  <polygon points="865,268 865,282 877,275" fill="#0ea5e9" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="150" cy="150" r="3" fill="#0ea5e9" opacity="0.4"/>
  <circle cx="1050" cy="480" r="3" fill="#0ea5e9" opacity="0.4"/>
  <circle cx="200" cy="500" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1000" cy="130" r="2" fill="#8b5cf6" opacity="0.3"/>
</svg>
