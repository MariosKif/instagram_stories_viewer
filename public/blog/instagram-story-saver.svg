<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="350" cy="220" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="850" cy="400" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Central bookmark/save icon -->
  <g transform="translate(600, 240)">
    <!-- Outer dashed circle -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.12" stroke-dasharray="10 6"/>
    <!-- Inner glow circle -->
    <circle cx="0" cy="0" r="80" fill="#0ea5e9" opacity="0.04"/>
    <!-- Large bookmark ribbon -->
    <path d="M-30 -55 L-30 35 L0 15 L30 35 L30 -55Z" fill="#1e293b" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M-30 -55 L-30 35 L0 15 L30 35 L30 -55Z" fill="#0ea5e9" opacity="0.1"/>
    <!-- Star inside bookmark -->
    <path d="M0 -30 L7 -14 L24 -12 L12 0 L15 17 L0 9 L-15 17 L-12 0 L-24 -12 L-7 -14Z" fill="#0ea5e9" opacity="0.5"/>
  </g>
  <!-- Floppy disk icon (left) -->
  <g transform="translate(410, 210)" opacity="0.5">
    <rect x="-24" y="-24" width="48" height="48" rx="6" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <rect x="-8" y="-24" width="16" height="16" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <rect x="-16" y="4" width="32" height="20" rx="3" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="-10" y1="12" x2="10" y2="12" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
    <line x1="-10" y1="18" x2="6" y2="18" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Archive box icon (right) -->
  <g transform="translate(790, 210)" opacity="0.5">
    <rect x="-28" y="-18" width="56" height="14" rx="3" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <path d="M-24 -4 L-24 24 L24 24 L24 -4" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linejoin="round"/>
    <line x1="-8" y1="8" x2="8" y2="8" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Small download arrow (bottom-left area) -->
  <g transform="translate(470, 320)" opacity="0.4">
    <rect x="-2" y="-14" width="4" height="18" rx="2" fill="url(#accent)"/>
    <path d="M-8 4 L0 14 L8 4" stroke="url(#accent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-10" y="18" width="20" height="2.5" rx="1.25" fill="url(#accent)" opacity="0.5"/>
  </g>
  <!-- Shield/checkmark (bottom-right area) -->
  <g transform="translate(730, 320)" opacity="0.4">
    <path d="M0 -18 L16 -10 L16 4 C16 14 8 22 0 26 C-8 22 -16 14 -16 4 L-16 -10Z" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M-6 2 L-2 8 L8 -4" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Story Saver</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">SAVE &amp; ARCHIVE STORIES BEFORE THEY EXPIRE</text>
  <!-- Decorative dots -->
  <circle cx="110" cy="95" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1090" cy="535" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="160" cy="510" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1040" cy="120" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="940" cy="75" r="4" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="260" cy="555" r="4" fill="#22d3ee" opacity="0.15"/>
</svg>