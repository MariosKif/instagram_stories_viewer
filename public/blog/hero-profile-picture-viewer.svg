<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="orb1" cx="30%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="75%" cy="65%" r="35%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="600" cy="280" r="90"/>
    </clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>
  <!-- Profile picture circle outline -->
  <circle cx="600" cy="280" r="95" fill="none" stroke="#0ea5e9" stroke-width="2.5" opacity="0.7"/>
  <circle cx="600" cy="280" r="90" fill="#1e293b" opacity="0.8"/>
  <!-- Person silhouette inside circle -->
  <circle cx="600" cy="255" r="28" fill="#0ea5e9" opacity="0.4"/>
  <ellipse cx="600" cy="320" rx="42" ry="28" fill="#0ea5e9" opacity="0.3"/>
  <!-- Magnifying glass -->
  <circle cx="670" cy="350" r="35" fill="none" stroke="#0ea5e9" stroke-width="2.5" opacity="0.6"/>
  <line x1="694" y1="374" x2="720" y2="400" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Plus/zoom icon inside magnifier -->
  <line x1="660" y1="350" x2="680" y2="350" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="670" y1="340" x2="670" y2="360" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Small profile circles left -->
  <circle cx="350" cy="260" r="30" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.2"/>
  <circle cx="350" cy="248" r="10" fill="#0ea5e9" opacity="0.15"/>
  <ellipse cx="350" cy="275" rx="15" ry="10" fill="#0ea5e9" opacity="0.12"/>
  <!-- Small profile circles right -->
  <circle cx="850" cy="260" r="30" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.2"/>
  <circle cx="850" cy="248" r="10" fill="#0ea5e9" opacity="0.15"/>
  <ellipse cx="850" cy="275" rx="15" ry="10" fill="#0ea5e9" opacity="0.12"/>
  <!-- Arrow from small to big (left) -->
  <line x1="385" y1="260" x2="500" y2="275" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 4" opacity="0.2"/>
  <!-- Arrow from small to big (right) -->
  <line x1="815" y1="260" x2="700" y2="275" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 4" opacity="0.2"/>
  <!-- HD badge -->
  <rect x="555" y="400" width="90" height="30" rx="6" fill="#0ea5e9" opacity="0.15"/>
  <text x="600" y="420" text-anchor="middle" fill="#0ea5e9" font-family="system-ui,sans-serif" font-size="14" font-weight="600" opacity="0.7">FULL HD</text>
  <!-- Decorative dots -->
  <circle cx="180" cy="160" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1020" cy="470" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="230" cy="480" r="2" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="970" cy="150" r="2" fill="#8b5cf6" opacity="0.25"/>
</svg>
