<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="200" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="400" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Follower growth chart -->
  <g transform="translate(600, 230)">
    <!-- Chart frame -->
    <rect x="-240" y="-130" width="480" height="260" rx="14" fill="#1e293b" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <!-- Growth line -->
    <polyline points="-200,80 -150,60 -100,50 -50,20 0,-10 50,-40 100,-60 150,-70 200,-100" stroke="#0ea5e9" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Area fill -->
    <polygon points="-200,80 -150,60 -100,50 -50,20 0,-10 50,-40 100,-60 150,-70 200,-100 200,100 -200,100" fill="#0ea5e9" opacity="0.06"/>
    <!-- Data points -->
    <circle cx="-200" cy="80" r="4" fill="#0ea5e9"/>
    <circle cx="-100" cy="50" r="4" fill="#0ea5e9"/>
    <circle cx="0" cy="-10" r="4" fill="#0ea5e9"/>
    <circle cx="100" cy="-60" r="4" fill="#0ea5e9"/>
    <circle cx="200" cy="-100" r="6" fill="#22d3ee" stroke="#22d3ee" stroke-width="2"/>
    <!-- User icons -->
    <g transform="translate(-200, -100)" opacity="0.5">
      <circle cx="0" cy="-8" r="7" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
      <path d="M-10,8 Q-10,0 0,-2 Q10,0 10,8" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    </g>
    <g transform="translate(-160, -100)" opacity="0.5">
      <circle cx="0" cy="-8" r="7" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <path d="M-10,8 Q-10,0 0,-2 Q10,0 10,8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    </g>
    <g transform="translate(-120, -100)" opacity="0.5">
      <circle cx="0" cy="-8" r="7" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
      <path d="M-10,8 Q-10,0 0,-2 Q10,0 10,8" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    </g>
    <!-- Follower count -->
    <text x="160" y="-90" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="700" fill="#22d3ee">52.4K</text>
    <text x="160" y="-72" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8" opacity="0.6">FOLLOWERS</text>
    <!-- X axis -->
    <line x1="-210" y1="105" x2="210" y2="105" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
  </g>
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Follower Analyzer</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">TRACK GROWTH, SPOT TRENDS, OPTIMIZE YOUR AUDIENCE</text>
  <circle cx="100" cy="100" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1100" cy="530" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="150" cy="500" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1050" cy="130" r="2" fill="#22d3ee" opacity="0.2"/>
