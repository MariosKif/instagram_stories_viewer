<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="400" cy="280" r="220" fill="#0ea5e9" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="800" cy="350" r="200" fill="#22d3ee" opacity="0.05" filter="url(#blur1)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Camera body -->
  <g transform="translate(480, 210)">
    <rect x="-80" y="-50" width="160" height="110" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Lens -->
    <circle cx="0" cy="10" r="38" fill="none" stroke="#0ea5e9" stroke-width="2.5" opacity="0.6"/>
    <circle cx="0" cy="10" r="30" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="22" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="10" r="14" fill="#1e293b"/>
    <circle cx="0" cy="10" r="6" fill="#0ea5e9" opacity="0.4"/>
    <!-- Flash -->
    <circle cx="50" cy="-25" r="6" fill="#22d3ee" opacity="0.3"/>
    <circle cx="50" cy="-25" r="3" fill="#22d3ee" opacity="0.5"/>
    <!-- Viewfinder bump -->
    <rect x="-25" y="-62" width="50" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Shutter -->
    <circle cx="35" cy="-62" r="8" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
    <circle cx="35" cy="-62" r="4" fill="#0ea5e9" opacity="0.3"/>
  </g>
  <!-- Photo stack -->
  <g transform="translate(480, 210)">
    <rect x="100" y="-30" width="90" height="70" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5" transform="rotate(8, 145, 5)"/>
    <rect x="95" y="-35" width="90" height="70" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5" transform="rotate(-4, 140, 0)"/>
    <rect x="90" y="-40" width="90" height="70" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5" opacity="0.8"/>
    <circle cx="120" cy="-18" r="6" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
    <path d="M100 16 L115 -2 L130 10 L140 2 L155 16" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.5" stroke-linejoin="round"/>
  </g>
  <!-- Download arrow -->
  <g transform="translate(680, 290)">
    <circle cx="0" cy="0" r="32" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="-3" y="-18" width="6" height="22" rx="3" fill="url(#accent)"/>
    <path d="M-12 4 L0 18 L12 4" stroke="url(#accent)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-14" y="22" width="28" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
  </g>
  <!-- HD badge -->
  <g transform="translate(770, 180)">
    <rect x="-22" y="-12" width="44" height="24" rx="5" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0ea5e9">HD</text>
  </g>
  <!-- Dashed orbit -->
  <circle cx="530" cy="250" r="160" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.1" stroke-dasharray="8 8"/>
  <!-- Text -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Photo Downloader</text>
  <text x="600" y="458" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">SAVE PHOTOS &amp; CAROUSEL POSTS IN HD</text>
  <!-- Bottom accent line -->
  <rect x="500" y="480" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Corner decorations -->
  <path d="M40 40 L40 80 M40 40 L80 40" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 40 L1160 80 M1160 40 L1120 40" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M40 590 L40 550 M40 590 L80 590" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 590 L1160 550 M1160 590 L1120 590" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>