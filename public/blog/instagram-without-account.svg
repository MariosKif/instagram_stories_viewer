<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="380" cy="260" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="820" cy="370" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Central unlock/open-access icon composition -->
  <g transform="translate(600, 250)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.15"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.1" stroke-dasharray="8 4"/>
    <!-- Unlocked padlock -->
    <g transform="translate(-38, -45)">
      <!-- Lock body -->
      <rect x="0" y="30" width="76" height="55" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="2.5"/>
      <!-- Shackle (unlocked - open position) -->
      <path d="M18 30 L18 10 Q18 -10 38 -10 Q58 -10 58 10 L58 15" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
      <!-- Keyhole -->
      <circle cx="38" cy="52" r="8" fill="url(#accent)" opacity="0.8"/>
      <rect x="35" y="55" width="6" height="14" rx="2" fill="url(#accent)" opacity="0.8"/>
      <!-- Checkmark inside lock area -->
      <path d="M26 72 L34 80 L52 62" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    </g>
    <!-- Eye icon (viewing/no-login access) - left -->
    <g transform="translate(-130, -15)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="28" ry="18" fill="none" stroke="#0ea5e9" stroke-width="2"/>
      <circle cx="0" cy="0" r="8" fill="#0ea5e9" opacity="0.3"/>
      <circle cx="0" cy="0" r="4" fill="#0ea5e9" opacity="0.6"/>
    </g>
    <!-- Globe icon (open web access) - right -->
    <g transform="translate(130, -15)" opacity="0.4">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="10" ry="22" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#22d3ee" stroke-width="1"/>
      <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#22d3ee" stroke-width="0.8"/>
      <line x1="-18" y1="10" x2="18" y2="10" stroke="#22d3ee" stroke-width="0.8"/>
    </g>
    <!-- No-login badge (crossed-out user icon) - top right -->
    <g transform="translate(80, -80)" opacity="0.35">
      <circle cx="0" cy="-8" r="7" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
      <path d="M-12 10 Q-12 0 0 0 Q12 0 12 10" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
      <line x1="-14" y1="14" x2="14" y2="-18" stroke="#ef4444" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    </g>
    <!-- Shield icon (safety) - top left -->
    <g transform="translate(-80, -80)" opacity="0.35">
      <path d="M0 -18 L-16 -8 L-16 6 Q-16 18 0 24 Q16 18 16 6 L16 -8 Z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <path d="M-6 2 L-2 8 L8 -4" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Content type indicators - small icons around the lock -->
    <!-- Image icon - bottom left -->
    <g transform="translate(-90, 60)" opacity="0.3">
      <rect x="-14" y="-12" width="28" height="24" rx="3" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
      <circle cx="-5" cy="-3" r="3" fill="#0ea5e9" opacity="0.5"/>
      <path d="M-14 8 L-4 0 L4 6 L10 2 L14 8" fill="none" stroke="#0ea5e9" stroke-width="1"/>
    </g>
    <!-- Video/play icon - bottom right -->
    <g transform="translate(90, 60)" opacity="0.3">
      <rect x="-14" y="-12" width="28" height="24" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <path d="M-4 -6 L8 0 L-4 6 Z" fill="#22d3ee" opacity="0.5"/>
    </g>
  </g>
  <!-- Text -->
  <text x="600" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Without Account</text>
  <text x="600" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">8 PROVEN FREE WAYS TO BROWSE IN 2025</text>
  <!-- Decorative dots -->
  <circle cx="100" cy="95" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1100" cy="535" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="150" cy="520" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1050" cy="110" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="940" cy="80" r="4" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="260" cy="550" r="4" fill="#22d3ee" opacity="0.15"/>
  <circle cx="200" cy="180" r="2.5" fill="#22d3ee" opacity="0.18"/>
  <circle cx="1000" cy="460" r="2.5" fill="#0ea5e9" opacity="0.18"/>
</svg>
