    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#0ea5e9" stroke-width="2.5"/>
    <path d="M-12 -18 L20 0 L-12 18Z" fill="url(#play)" opacity="0.9"/>
    <!-- Reels icon (clapperboard stripe) -->
    <g transform="translate(0, -75)" opacity="0.6">
      <rect x="-30" y="-8" width="60" height="16" rx="4" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="1"/>
      <line x1="-15" y1="-8" x2="-8" y2="8" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
      <line x1="5" y1="-8" x2="12" y2="8" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
    </g>
  </g>
  <!-- Musical note accents -->
  <g transform="translate(440, 170)" opacity="0.25">
    <circle cx="0" cy="0" r="6" fill="#22d3ee"/>
    <rect x="5" y="-25" width="3" height="25" fill="#22d3ee"/>
    <path d="M8 -25 Q20 -30 8 -18" fill="#22d3ee"/>
  </g>
  <g transform="translate(770, 150)" opacity="0.2">
    <circle cx="0" cy="0" r="5" fill="#0ea5e9"/>
    <rect x="4" y="-20" width="2.5" height="20" fill="#0ea5e9"/>
    <path d="M6.5 -20 Q16 -24 6.5 -14" fill="#0ea5e9"/>
  </g>
  <!-- Text -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Reels Viewer</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">WATCH &amp; SAVE PUBLIC REELS WITHOUT LOGIN</text>
  <!-- Decorative dots -->
  <circle cx="110" cy="100" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1090" cy="530" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="160" cy="510" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1040" cy="120" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="930" cy="75" r="4" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="270" cy="555" r="4" fill="#22d3ee" opacity="0.15"/>
</svg>
