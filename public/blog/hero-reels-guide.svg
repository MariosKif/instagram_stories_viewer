    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Film reel / video icon composition -->
  <g transform="translate(600, 260)">
    <!-- Outer reel circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.2"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.1" stroke-dasharray="6 6"/>
    <!-- Film strip left -->
    <g transform="translate(-140, -60)" opacity="0.4">
      <rect width="50" height="120" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <rect x="5" y="8" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
      <rect x="33" y="8" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
      <rect x="5" y="24" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
      <rect x="33" y="24" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
      <rect x="5" y="40" width="40" height="40" rx="3" fill="#0ea5e9" opacity="0.1"/>
      <rect x="5" y="88" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
      <rect x="33" y="88" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
      <rect x="5" y="104" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
      <rect x="33" y="104" width="12" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
    </g>
    <!-- Film strip right -->
    <g transform="translate(90, -60)" opacity="0.4">
      <rect width="50" height="120" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <rect x="5" y="8" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
      <rect x="33" y="8" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
      <rect x="5" y="24" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
      <rect x="33" y="24" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
      <rect x="5" y="40" width="40" height="40" rx="3" fill="#22d3ee" opacity="0.1"/>
      <rect x="5" y="88" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
      <rect x="33" y="88" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
      <rect x="5" y="104" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
      <rect x="33" y="104" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.3"/>
    </g>
    <!-- Center play button -->
