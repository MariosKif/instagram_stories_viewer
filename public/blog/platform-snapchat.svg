<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFC00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="400" cy="300" r="200" fill="#FFFC00" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="800" cy="300" r="200" fill="#FFD700" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="600" cy="250" r="160" fill="#FFFC00" opacity="0.03" filter="url(#blur1)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- Central icon: Ghost shape -->
  <g transform="translate(600,230)">
    <!-- Ghost body -->
    <path d="M0 -60 C-40 -60 -55 -35 -55 -5 L-55 45 L-38 32 L-22 48 L-5 32 L12 48 L28 32 L45 48 L55 38 L55 -5 C55 -35 40 -60 0 -60 Z"
          fill="none" stroke="#FFFC00" stroke-width="2.5" opacity="0.7"/>
    <!-- Ghost fill -->
    <path d="M0 -60 C-40 -60 -55 -35 -55 -5 L-55 45 L-38 32 L-22 48 L-5 32 L12 48 L28 32 L45 48 L55 38 L55 -5 C55 -35 40 -60 0 -60 Z"
          fill="#FFFC00" opacity="0.08"/>
    <!-- Eyes -->
    <ellipse cx="-18" cy="-15" rx="8" ry="10" fill="#FFFC00" opacity="0.6"/>
    <ellipse cx="18" cy="-15" rx="8" ry="10" fill="#FFFC00" opacity="0.6"/>
    <!-- Eye pupils -->
    <ellipse cx="-16" cy="-13" rx="4" ry="5" fill="#0f172a" opacity="0.8"/>
    <ellipse cx="20" cy="-13" rx="4" ry="5" fill="#0f172a" opacity="0.8"/>
  </g>
  <!-- Floating decorative elements -->
  <g opacity="0.25">
    <circle cx="430" cy="200" r="4" fill="#FFFC00"/>
    <circle cx="770" cy="230" r="3" fill="#FFD700"/>
    <circle cx="500" cy="350" r="3" fill="#FFFC00"/>
    <circle cx="700" cy="180" r="2.5" fill="#FFD700"/>
    <circle cx="350" cy="310" r="2" fill="#FFFC00"/>
    <circle cx="850" cy="290" r="3.5" fill="#FFD700"/>
  </g>
  <!-- Text -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Snapchat</text>
  <text x="600" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94a3b8">Tips &amp; Guides</text>
  <!-- Bottom accent line -->
  <rect x="530" y="460" width="140" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Corner decorations -->
  <path d="M40 40 L40 80 M40 40 L80 40" stroke="#FFFC00" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 40 L1160 80 M1160 40 L1120 40" stroke="#FFFC00" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M40 590 L40 550 M40 590 L80 590" stroke="#FFD700" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 590 L1160 550 M1160 590 L1120 590" stroke="#FFD700" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>