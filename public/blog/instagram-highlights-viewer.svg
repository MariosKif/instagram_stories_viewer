    <circle cx="200" cy="0" r="62" stroke="url(#ring)" stroke-width="3" fill="none"/>
    <circle cx="200" cy="0" r="55" fill="#1e293b"/>
    <path d="M185 -10 L195 -10 L195 0 L205 0 L205 10 L195 10 L195 20 L185 20 L185 10 L175 10 L175 0 L185 0Z" fill="#0ea5e9" opacity="0.6"/>
  </g>
  <!-- Star/bookmark icon -->
