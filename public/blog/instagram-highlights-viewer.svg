    <path d="M0 -78 L3 -72 L10 -71 L5 -66 L6 -59 L0 -62 L-6 -59 L-5 -66 L-10 -71 L-3 -72Z" fill="#22d3ee"/>
  </g>
  <!-- Text -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Highlights Viewer</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">BROWSE SAVED STORIES FROM ANY PUBLIC PROFILE</text>
