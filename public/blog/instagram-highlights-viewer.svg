    <circle cx="-200" cy="0" r="62" stroke="url(#ring)" stroke-width="3" fill="none"/>
    <circle cx="-200" cy="0" r="55" fill="#1e293b"/>
    <rect x="-225" y="-25" width="50" height="50" rx="8" fill="#0ea5e9" opacity="0.2"/>
    <path d="M-212 -12 L-188 0 L-212 12Z" fill="#0ea5e9" opacity="0.8"/>
    <!-- Circle 2 (center, larger) -->
