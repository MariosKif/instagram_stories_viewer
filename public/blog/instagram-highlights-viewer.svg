    <circle cx="0" cy="0" r="70" fill="#1e293b"/>
    <circle cx="0" cy="0" r="28" fill="#0ea5e9" opacity="0.15"/>
    <path d="M0 -20 C12 -20 20 -12 20 0 C20 12 12 20 0 20 C-12 20 -20 12 -20 0 C-20 -12 -12 -20 0 -20Z" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="6" cy="-6" r="5" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#0ea5e9"/>
