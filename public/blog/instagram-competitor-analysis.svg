    <circle cx="145" cy="-55" r="22" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="145" y="-50" text-anchor="middle" font-family="system-ui" font-size="12" fill="#22d3ee" opacity="0.8">B</text>
