<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="400" cy="300" r="200" fill="#0ea5e9" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="800" cy="300" r="200" fill="#22d3ee" opacity="0.06" filter="url(#blur1)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- Central icon: document/article -->
  <g transform="translate(600,250)">
    <!-- Document outline -->
    <rect x="-50" y="-70" width="100" height="130" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
    <!-- Lines representing text -->
    <line x1="-30" y1="-45" x2="30" y2="-45" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <line x1="-30" y1="-30" x2="20" y2="-30" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <line x1="-30" y1="-15" x2="30" y2="-15" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <line x1="-30" y1="0" x2="10" y2="0" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <!-- Image placeholder in doc -->
    <rect x="-30" y="15" width="60" height="30" rx="4" fill="#0ea5e9" stroke="#0ea5e9" stroke-width="1" opacity="0.25"/>
    <!-- Mountain in image placeholder -->
    <path d="M-20 40 L-5 25 L5 33 L15 22 L30 40 Z" fill="#0ea5e9" opacity="0.3"/>
  </g>
  <!-- Floating decorative elements -->
  <g opacity="0.25">
    <circle cx="430" cy="200" r="4" fill="#0ea5e9"/>
    <circle cx="770" cy="230" r="3" fill="#22d3ee"/>
    <circle cx="500" cy="350" r="3" fill="#0ea5e9"/>
    <circle cx="700" cy="180" r="2.5" fill="#22d3ee"/>
  </g>
  <!-- Text -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="0.5">IGStoryPeek Blog</text>
  <text x="600" y="445" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94a3b8">Tips, guides, and insights</text>
  <!-- Bottom accent line -->
  <rect x="530" y="470" width="140" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Corner decorations -->
  <path d="M40 40 L40 80 M40 40 L80 40" stroke="#0ea5e9" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 40 L1160 80 M1160 40 L1120 40" stroke="#0ea5e9" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M40 590 L40 550 M40 590 L80 590" stroke="#0ea5e9" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 590 L1160 550 M1160 590 L1120 590" stroke="#0ea5e9" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>