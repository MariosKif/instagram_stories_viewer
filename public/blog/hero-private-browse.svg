    <path d="M0 -110 L75 -80 L75 20 C75 75 0 120 0 120 C0 120 -75 75 -75 20 L-75 -80Z" fill="#0ea5e9" opacity="0.06"/>
    <!-- Shield body -->
    <path d="M0 -95 L65 -68 L65 15 C65 62 0 102 0 102 C0 102 -65 62 -65 15 L-65 -68Z" fill="#1e293b" stroke="#0ea5e9" stroke-width="2.5"/>
    <!-- Shield inner highlight -->
    <path d="M0 -80 L52 -57 L52 10 C52 48 0 82 0 82 C0 82 -52 48 -52 10 L-52 -57Z" fill="#0ea5e9" opacity="0.05"/>
