  <g transform="translate(900, 370)" opacity="0.15">
    <ellipse cx="-12" cy="0" rx="14" ry="10" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <ellipse cx="18" cy="0" rx="14" ry="10" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
    <line x1="2" y1="-6" x2="8" y2="6" stroke="#ef4444" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Private Instagram Viewer</text>
  <text x="600" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">5 ESSENTIAL FACTS ABOUT PRIVACY &amp; SCAM PROTECTION</text>
  <!-- Decorative dots -->
