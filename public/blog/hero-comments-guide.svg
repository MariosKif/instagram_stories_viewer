<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="350" cy="250" r="200" fill="#0ea5e9" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="850" cy="380" r="180" fill="#22d3ee" opacity="0.06" filter="url(#blur1)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Chat bubbles -->
  <g transform="translate(600, 220)">
    <!-- Left bubble -->
    <rect x="-180" y="-80" width="200" height="60" rx="20" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5" opacity="0.8"/>
    <rect x="-160" y="-62" width="120" height="6" rx="3" fill="#0ea5e9" opacity="0.3"/>
    <rect x="-160" y="-48" width="80" height="6" rx="3" fill="#0ea5e9" opacity="0.2"/>
    <!-- Right bubble -->
    <rect x="-20" y="-10" width="200" height="60" rx="20" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" opacity="0.8"/>
    <rect x="0" y="8" width="140" height="6" rx="3" fill="#22d3ee" opacity="0.3"/>
    <rect x="0" y="22" width="100" height="6" rx="3" fill="#22d3ee" opacity="0.2"/>
    <!-- Third bubble -->
    <rect x="-180" y="60" width="220" height="60" rx="20" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5" opacity="0.8"/>
    <rect x="-160" y="78" width="160" height="6" rx="3" fill="#0ea5e9" opacity="0.3"/>
    <rect x="-160" y="92" width="110" height="6" rx="3" fill="#0ea5e9" opacity="0.2"/>
    <!-- Eye icon (private viewing) -->
    <g transform="translate(120, -60)">
      <circle cx="0" cy="0" r="30" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="14" ry="9" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#22d3ee" opacity="0.8"/>
    </g>
    <!-- Shield icon -->
    <g transform="translate(-100, 10)" opacity="0.5">
      <path d="M0,-18 L15,-10 L15,8 Q15,18 0,24 Q-15,18 -15,8 L-15,-10 Z" fill="none" stroke="#0ea5e9" stroke-width="2"/>
      <path d="M-5,2 L-1,8 L8,-4" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Text -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram Comment Viewer</text>
  <text x="600" y="458" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">READ AND ANALYZE COMMENTS PRIVATELY</text>
  <!-- Bottom accent line -->
  <rect x="500" y="480" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Corner decorations -->
  <path d="M40 40 L40 80 M40 40 L80 40" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 40 L1160 80 M1160 40 L1120 40" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M40 590 L40 550 M40 590 L80 590" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M1160 590 L1160 550 M1160 590 L1120 590" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>