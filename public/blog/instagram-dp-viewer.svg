<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="380" cy="260" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="820" cy="370" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="480" cy="250" r="80"/>
    </clipPath>
    <clipPath id="avatarClip2">
      <circle cx="720" cy="250" r="55"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Large profile picture circle (main) -->
  <g transform="translate(480, 250)">
    <!-- Outer Instagram-style gradient ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#0ea5e9" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="105" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15" stroke-dasharray="8 4"/>
    <!-- Profile picture background -->
    <circle cx="0" cy="0" r="80" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Avatar silhouette (head) -->
    <circle cx="0" cy="-15" r="25" fill="#0ea5e9" opacity="0.25"/>
    <!-- Avatar silhouette (body) -->
    <ellipse cx="0" cy="40" rx="40" ry="25" fill="#0ea5e9" opacity="0.2"/>
    <!-- HD badge -->
    <g transform="translate(55, -70)">
      <rect x="-18" y="-11" width="36" height="22" rx="6" fill="#0ea5e9" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0f172a">HD</text>
    </g>
    <!-- Resolution indicator lines -->
    <g opacity="0.15">
      <line x1="-95" y1="-95" x2="-110" y2="-110" stroke="#0ea5e9" stroke-width="1.5"/>
      <line x1="-110" y1="-115" x2="-110" y2="-105" stroke="#0ea5e9" stroke-width="1.5"/>
      <line x1="-115" y1="-110" x2="-105" y2="-110" stroke="#0ea5e9" stroke-width="1.5"/>
      <line x1="95" y1="95" x2="110" y2="110" stroke="#0ea5e9" stroke-width="1.5"/>
      <line x1="110" y1="105" x2="110" y2="115" stroke="#0ea5e9" stroke-width="1.5"/>
      <line x1="105" y1="110" x2="115" y2="110" stroke="#0ea5e9" stroke-width="1.5"/>
    </g>
  </g>
  <!-- Smaller profile picture (before/compressed) -->
  <g transform="translate(280, 200)" opacity="0.5">
    <circle cx="0" cy="0" r="35" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="10" fill="#0ea5e9" opacity="0.2"/>
    <ellipse cx="0" cy="15" rx="16" ry="10" fill="#0ea5e9" opacity="0.15"/>
    <!-- Small size indicator -->
    <text x="0" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">150px</text>
  </g>
  <!-- Arrow from small to large -->
  <g opacity="0.3">
    <line x1="325" y1="220" x2="370" y2="235" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="370,232 380,237 370,240" fill="#0ea5e9"/>
  </g>
  <!-- Magnifying glass over second profile -->
  <g transform="translate(730, 240)">
    <!-- Profile behind magnifying glass -->
    <circle cx="0" cy="0" r="55" fill="#1e293b" stroke="#334155" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-8" r="16" fill="#22d3ee" opacity="0.15"/>
    <ellipse cx="0" cy="22" rx="26" ry="16" fill="#22d3ee" opacity="0.1"/>
    <!-- Magnifying glass -->
    <circle cx="10" cy="10" r="42" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.6"/>
    <line x1="38" y1="38" x2="65" y2="65" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Zoom + icon inside glass -->
    <g transform="translate(10, 10)" opacity="0.4">
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#22d3ee" stroke-width="2"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#22d3ee" stroke-width="2"/>
    </g>
  </g>
  <!-- Pixel grid detail (showing enlargement concept) -->
  <g transform="translate(870, 170)" opacity="0.2">
    <rect x="0" y="0" width="12" height="12" fill="#0ea5e9" opacity="0.4" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="12" y="0" width="12" height="12" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="24" y="0" width="12" height="12" fill="#0ea5e9" opacity="0.3" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="0" y="12" width="12" height="12" fill="#0ea5e9" opacity="0.3" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="12" y="12" width="12" height="12" fill="#0ea5e9" opacity="0.5" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="24" y="12" width="12" height="12" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="0" y="24" width="12" height="12" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="12" y="24" width="12" height="12" fill="#0ea5e9" opacity="0.3" stroke="#0ea5e9" stroke-width="0.5"/>
    <rect x="24" y="24" width="12" height="12" fill="#0ea5e9" opacity="0.4" stroke="#0ea5e9" stroke-width="0.5"/>
  </g>
  <!-- Image frame icon -->
  <g transform="translate(870, 280)" opacity="0.25">
    <rect x="-20" y="-15" width="40" height="30" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="-8" cy="-4" r="4" fill="#22d3ee" opacity="0.5"/>
    <path d="M-20 10 L-8 0 L0 6 L8 -2 L20 10" fill="none" stroke="#22d3ee" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Instagram DP Viewer</text>
  <text x="600" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">VIEW FULL-SIZE PROFILE PICTURES IN HD</text>
  <!-- Decorative dots -->
  <circle cx="110" cy="100" r="3" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="1090" cy="530" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="160" cy="510" r="2" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1040" cy="120" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="930" cy="75" r="4" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="270" cy="555" r="4" fill="#22d3ee" opacity="0.15"/>
  <circle cx="200" cy="380" r="2.5" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="1000" cy="420" r="2.5" fill="#22d3ee" opacity="0.18"/>
</svg>
